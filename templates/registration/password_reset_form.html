{% extends "registration/base.html" %}
{% load i18n static %}

{% block content %}
<p class="mb-4">Ingresa tu correo electr&oacute;nico y te enviaremos instrucciones para restablecer tu contrase&ntilde;a.</p>
<form method="post">
    {% csrf_token %}
    <div class="input-group mb-4">
        <input type="email" name="email" class="form-control" placeholder="Correo Electr&oacute;nico" required>
        <div class="input-group-append">
            <div class="input-group-text">
                <span class="fas fa-envelope"></span>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block">
                {% trans "Enviar correo" %}
            </button>
        </div>
    </div>
</form>
<div class="mt-4 text-center">
    <a href="{% url 'admin:login' %}" class="forgot-password-luxe">Volver al inicio de sesi&oacute;n</a>
</div>
{% endblock %}
